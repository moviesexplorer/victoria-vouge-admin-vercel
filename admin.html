<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victoria Vogue - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== RESET ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100%;
            background: #2d1b14;
            color: #fff;
            padding: 20px;
            z-index: 1000;
        }
        .sidebar .logo {
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem;
            color: #d4a373;
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        .sidebar .menu {
            list-style: none;
        }
        .sidebar .menu li {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 5px;
        }
        .sidebar .menu li:hover {
            background: rgba(212,163,115,0.2);
        }
        .sidebar .menu li.active {
            background: #d4a373;
            color: #fff;
        }
        .sidebar .menu li i {
            margin-right: 10px;
            width: 20px;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
            margin-bottom: 30px;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header .user-info img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        /* ===== STATS CARDS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 600;
            color: #2d1b14;
        }
        .stat-card .icon {
            float: right;
            font-size: 2rem;
            color: #d4a373;
        }

        /* ===== TABLES ===== */
        .table-container {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th, table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        table th {
            background: #f9f9f9;
            font-weight: 500;
        }
        table tr:hover {
            background: #f9f9f9;
        }
        .btn {
            padding: 6px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-primary {
            background: #d4a373;
            color: #fff;
        }
        .btn-primary:hover {
            background: #b8834a;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-success {
            background: #27ae60;
            color: #fff;
        }
        .btn-success:hover {
            background: #229954;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            padding: 30px;
            position: relative;
        }
        .modal-content .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        .modal-content h2 {
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
        }
        .modal-content .form-group {
            margin-bottom: 15px;
        }
        .modal-content .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .modal-content .form-group input,
        .modal-content .form-group select,
        .modal-content .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }
        .modal-content .form-group input:focus,
        .modal-content .form-group select:focus,
        .modal-content .form-group textarea:focus {
            border-color: #d4a373;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 10px; }
            .sidebar .logo { font-size: 1rem; }
            .sidebar .menu li span { display: none; }
            .sidebar .menu li i { font-size: 1.2rem; }
            .main-content { margin-left: 60px; }
        }
    </style>
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="logo">V<span style="color:#fff;">V</span></div>
        <ul class="menu">
            <li class="active" onclick="loadPage('dashboard')">
                <i class="fas fa-home"></i> <span>Dashboard</span>
            </li>
            <li onclick="loadPage('products')">
                <i class="fas fa-shopping-bag"></i> <span>Products</span>
            </li>
            <li onclick="loadPage('orders')">
                <i class="fas fa-truck"></i> <span>Orders</span>
            </li>
            <li onclick="loadPage('users')">
                <i class="fas fa-users"></i> <span>Users</span>
            </li>
            <li onclick="loadPage('settings')">
                <i class="fas fa-cog"></i> <span>Settings</span>
            </li>
            <li onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </li>
        </ul>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
        <div class="header">
            <h1>Dashboard</h1>
            <div class="user-info">
                <span>Admin</span>
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150" alt="Admin">
            </div>
        </div>

        <div id="page-content">
            <!-- Content will be loaded by JS -->
        </div>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">✕</span>
            <h2 id="modalTitle">Add Product</h2>
            <div id="modalBody">
                <!-- Form will be loaded by JS -->
            </div>
        </div>
    </div>

    <script>
        // ===== API CONFIGURATION =====
        const API_URL = 'https://victoria-vogue-production.up.railway.app/api';
        let token = localStorage.getItem('adminToken');

        // ===== LOAD PAGE =====
        function loadPage(page) {
            document.querySelectorAll('.menu li').forEach(el => el.classList.remove('active'));
            event.target.closest('li').classList.add('active');
            
            switch(page) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'products':
                    loadProducts();
                    break;
                case 'orders':
                    loadOrders();
                    break;
                case 'users':
                    loadUsers();
                    break;
                case 'settings':
                    loadSettings();
                    break;
            }
        }

        // ===== DASHBOARD =====
        async function loadDashboard() {
            const container = document.getElementById('page-content');
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Products</h3>
                        <div class="number" id="totalProducts">0</div>
                        <div class="icon"><i class="fas fa-box"></i></div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Orders</h3>
                        <div class="number" id="totalOrders">0</div>
                        <div class="icon"><i class="fas fa-shopping-cart"></i></div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <div class="number" id="totalUsers">0</div>
                        <div class="icon"><i class="fas fa-users"></i></div>
                    </div>
                    <div class="stat-card">
                        <h3>Revenue</h3>
                        <div class="number" id="totalRevenue">$0</div>
                        <div class="icon"><i class="fas fa-dollar-sign"></i></div>
                    </div>
                </div>
                <div class="table-container">
                    <h3>Recent Orders</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrders">
                            <tr><td colspan="5">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            
            await fetchStats();
            await fetchRecentOrders();
        }

        async function fetchStats() {
            try {
                const response = await fetch(`${API_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                document.getElementById('totalProducts').textContent = data.products || 0;
                document.getElementById('totalOrders').textContent = data.orders || 0;
                document.getElementById('totalUsers').textContent = data.users || 0;
                document.getElementById('totalRevenue').textContent = `$${data.revenue || 0}`;
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        async function fetchRecentOrders() {
            try {
                const response = await fetch(`${API_URL}/admin/orders?limit=5`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await response.json();
                const tbody = document.getElementById('recentOrders');
                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td>#${order._id}</td>
                        <td>${order.user?.name || 'Guest'}</td>
                        <td>${order.currency} ${order.total}</td>
                        <td><span style="background:${getStatusColor(order.status)};padding:3px 10px;border-radius:20px;font-size:0.7rem;">${order.status}</span></td>
                        <td>${new Date(order.createdAt).toLocaleDateString()}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error fetching orders:', error);
            }
        }

        // ===== PRODUCTS =====
        async function loadProducts() {
            const container = document.getElementById('page-content');
            container.innerHTML = `
                <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
                    <h2>Products</h2>
                    <button class="btn btn-primary" onclick="openModal('add')">+ Add Product</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTable">
                            <tr><td colspan="6">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            await fetchProducts();
        }

        async function fetchProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                const data = await response.json();
                const products = data.products || data;
                const tbody = document.getElementById('productsTable');
                tbody.innerHTML = products.map(product => `
                    <tr>
                        <td><img src="${product.images?.[0] || 'https://via.placeholder.com/50'}" width="50" height="50" style="border-radius:8px;object-fit:cover;"></td>
                        <td>${product.name}</td>
                        <td>${product.category}</td>
                        <td>$${product.price}</td>
                        <td>
                            <span style="color:${product.stock > 0 ? '#27ae60' : '#e74c3c'};">
                                ${product.stock > 0 ? 'In Stock' : 'Out of Stock'}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-primary" onclick="openModal('edit', '${product._id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProduct('${product._id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error fetching products:', error);
            }
        }

        // ===== ORDERS =====
        async function loadOrders() {
            const container = document.getElementById('page-content');
            container.innerHTML = `
                <h2 style="margin-bottom:20px;">Orders</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTable">
                            <tr><td colspan="6">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            `;
            await fetchAllOrders();
        }

        async function fetchAllOrders() {
            try {
                const response = await fetch(`${API_URL}/admin/orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await response.json();
                const tbody = document.getElementById('ordersTable');
                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td>#${order._id}</td>
                        <td>${order.user?.name || 'Guest'}</td>
                        <td>${order.items?.length || 0} items</td>
                        <td>${order.currency} ${order.total}</td>
                        <td>
                            <select onchange="updateOrderStatus('${order._id}', this.value)" style="padding:3px 10px;border-radius:20px;border:1px solid #ddd;">
                                ${['pending','confirmed','processing','shipped','delivered','cancelled'].map(status => 
                                    `<option value="${status}" ${order.status === status ? 'selected' : ''}>${status}</option>`
                                ).join('')}
                            </select>
                        </td>
                        <td>
                            <button class="btn btn-primary" onclick="viewOrder('${order._id}')">View</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error fetching orders:', error);
            }
        }

        // ===== MODAL =====
        function openModal(action, id = null) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            modal.classList.add('active');
            
            if(action === 'add') {
                title.textContent = 'Add New Product';
                body.innerHTML = `
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="productName" placeholder="Enter product name">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="productCategory">
                            <option value="Makeup">Makeup</option>
                            <option value="Skincare">Skincare</option>
                            <option value="Fragrance">Fragrance</option>
                            <option value="Bath & Body">Bath & Body</option>
                            <option value="Wellness">Wellness</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" id="productPrice" placeholder="Enter price">
                    </div>
                    <div class="form-group">
                        <label>Original Price</label>
                        <input type="number" id="productOriginalPrice" placeholder="Enter original price">
                    </div>
                    <div class="form-group">
                        <label>Stock</label>
                        <input type="number" id="productStock" placeholder="Enter stock quantity">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDescription" rows="3" placeholder="Enter product description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Ingredients</label>
                        <textarea id="productIngredients" rows="2" placeholder="Enter ingredients"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="text" id="productImage" placeholder="Enter image URL">
                    </div>
                    <button class="btn btn-success" onclick="saveProduct()" style="width:100%;padding:12px;">Save Product</button>
                `;
            } else if(action === 'edit') {
                title.textContent = 'Edit Product';
                // Fetch product data and fill form
                fetchProductData(id);
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ===== PRODUCT FUNCTIONS =====
        async function saveProduct() {
            const productData = {
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                price: parseFloat(document.getElementById('productPrice').value),
                originalPrice: parseFloat(document.getElementById('productOriginalPrice').value) || 0,
                stock: parseInt(document.getElementById('productStock').value) || 0,
                description: document.getElementById('productDescription').value,
                ingredients: document.getElementById('productIngredients').value,
                images: [document.getElementById('productImage').value]
            };
            
            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(productData)
                });
                const data = await response.json();
                if(response.ok) {
                    showToast('Product added successfully!');
                    closeModal();
                    loadProducts();
                } else {
                    showToast(data.error || 'Error adding product', 'error');
                }
            } catch (error) {
                showToast('Error adding product', 'error');
            }
        }

        async function deleteProduct(id) {
            if(!confirm('Are you sure you want to delete this product?')) return;
            
            try {
                const response = await fetch(`${API_URL}/products/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(response.ok) {
                    showToast('Product deleted successfully!');
                    loadProducts();
                }
            } catch (error) {
                showToast('Error deleting product', 'error');
            }
        }

        // ===== ORDER FUNCTIONS =====
        async function updateOrderStatus(id, status) {
            try {
                const response = await fetch(`${API_URL}/admin/orders/${id}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                if(response.ok) {
                    showToast('Order status updated!');
                }
            } catch (error) {
                showToast('Error updating order status', 'error');
            }
        }

        // ===== HELPER FUNCTIONS =====
        function getStatusColor(status) {
            const colors = {
                'pending': '#fff3e0',
                'confirmed': '#e3f2fd',
                'processing': '#e8f5e9',
                'shipped': '#e8f5e9',
                'delivered': '#c8e6c9',
                'cancelled': '#ffebee'
            };
            return colors[status] || '#f5f5f5';
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 30px; right: 30px;
                background: ${type === 'success' ? '#27ae60' : '#e74c3c'};
                color: #fff; padding: 15px 25px;
                border-radius: 12px; z-index: 3000;
                box-shadow: 0 5px 20px rgba(0,0,0,0.2);
                animation: slideIn 0.5s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ===== INIT =====
        loadDashboard();
    </script>
</body>
</html>
